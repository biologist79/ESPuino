name: build-all-firmwares
run-name: Build firmwares for all boards (BT and no-BT)
on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - master
  pull_request:
    paths:
      - "src/*"
      - "html/*"
      - "test/*"
      - "**.ini"
      - "**.py"
      - "**.csv"

jobs:
  test_builds:
    timeout-minutes: 180
    name: Run all Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - lolin_d32_pro
          - lolin_d32_pro_sdmmc_pe
          - ttgo_t8
          - complete

    steps:
      - uses: actions/checkout@v5

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install PlatformIO Core
        run: |
          pip install -U setuptools platformio
          pio upgrade --dev
          pio pkg update --global

      # --- Build 1: Bluetooth Disabled ---
      - name: Ensure BT is disabled
        run: |
          sed -i 's/^#define BLUETOOTH_ENABLE/\/\/#define BLUETOOTH_ENABLE/' src/settings.h

      - name: Build ${{ matrix.variant }} (no BT)
        run: platformio run -e ${{ matrix.variant }}

      - name: Upload Firmware (no BT)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.variant }}-noBT.bin
          path: .pio/build/${{ matrix.variant }}/firmware.bin

      # --- Build 2: Bluetooth Enabled ---
      - name: Activate BT
        run: |
          sed -i 's/\/\/#define BLUETOOTH_ENABLE/#define BLUETOOTH_ENABLE/' src/settings.h

      - name: Build ${{ matrix.variant }} (with BT)
        run: platformio run -e ${{ matrix.variant }}

      - name: Upload Firmware (with BT)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.variant }}-BT.bin
          path: .pio/build/${{ matrix.variant }}/firmware.bin

  commit:
    if: ${{ github.repository == 'biologist79/ESPuino' && (github.ref_name == 'dev' || github.ref_name == 'master') && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: test_builds
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: biologist79/ESPuino-Firmware
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: target-repo
          persist-credentials: true

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "firmware*"
          path: target-repo/Firmwares/${{ github.ref_name }}

      - name: Commit and push changes
        run: |
          cd target-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          mkdir -p Firmwares/${{ github.ref_name }}
          git add Firmwares/${{ github.ref_name }}/*.bin
          git commit -m "Firmware built from commit biologist79/ESPuino@${{ github.sha }}" || echo "No changes to commit"
          git push