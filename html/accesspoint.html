<body>
	<form id="settings" action="#wifiConfig" class="box" method="POST" onsubmit="wifiConfig(); return false">
		<h1 data-i18n="wifi.title"></h1>
		<div id="WiFiList"></div>
		<label for="ssid" data-i18n="wifi.ssid.title"></label>: <br>
		<input type="text" id="ssid" name="ssid" placeholder="SSID" required>
		<br>
		<label for="pwd" data-i18n="wifi.password.title"></label>: <br>
		<input type="password" id="pwd" name="pwd" autocomplete="off" required>
		<br>
		<label for="hostname" data-i18n="wifi.hostname.title"></label>: <br>
		<input type="text" id="hostname" name="hostname" value="espuino"
			pattern="^[0-9a-zA-Z][0-9a-zA-Z\\-]{0,30}[0-9a-zA-Z]" required>
		<br>
		<br>
		<input type="checkbox" id="scan_wifi_on_start" name="scan_wifi_on_start" value="false">
		<label for="scan_wifi_on_start" data-i18n="wifi.scan.enabled"></label>
		<br>
		<br>
		<input type="checkbox" id="static_enabled" name="static_enabled" value="false">
		<label for="static_enabled" data-i18n="wifi.static.enabled"></label>
		<div id="wifi_static_div" style="display:none">
			<label for="static_addr" data-i18n="wifi.static.addr"></label>: <br>
			<input type="text" id="static_addr" name="static_addr">
			<br>
			<br>
			<label for="static_gateway" data-i18n="wifi.static.gateway"></label>: <br>
			<input type="text" id="static_gateway" name="static_gateway">
			<br>
			<br>
			<label for="static_subnet" data-i18n="wifi.static.subnet"></label>: <br>
			<input type="text" id="static_subnet" name="static_subnet">
			<br>
			<br>
			<label for="static_dns1" data-i18n="wifi.static.dns1"></label>: <br>
			<input type="text" id="static_dns1" name="static_dns1">
			<br>
			<br>
			<label for="static_dns2" data-i18n="wifi.static.dns2"></label>: <br>
			<input type="text" id="static_dns2" name="static_dns2">
			<br>
			<br>
		</div>
		<button type="submit" class="btn" id="save-button" data-i18n="submit"></button>
	</form>
	<form action="/restart" method="POST" class="box">
		<h1 data-i18n="wifi.restartPrompt"></h1>
		<button type="submit" class="btn" id="restart-button" data-i18n="restart" value="Reboot"></button>
	</form>
	<div class="box">
		<h1 data-i18n="wifi.fullInterface.title"></h1>
		<p data-i18n="wifi.fullInterface.hint" style="font-size:13px;"></p>
		<input type="text" id="full-interface-url" readonly onclick="this.select(); this.setSelectionRange(0, 99999);">
		<button type="button" class="btn" id="copy-url-button" data-i18n="wifi.fullInterface.copy"></button>
		<div id="copy-url-status" style="min-height:20px; font-size:13px; color:#3498db;"></div>
	</div>
	<script>
		i18next.use(i18nextHttpBackend).init({
			backend: {
				loadPath: "/locales/{{lng}}.json"
			},
			debug: true,
			fallbackLng: 'de',
		}, (err, t) => {
			localize = locI18next.init(i18next);
			localize('body');
		});

		function selectWiFi(ssid) {
			document.getElementById("ssid").value = ssid;
			document.getElementById("pwd").focus();
		}
		async function getWiFiList() {
			try {
				const response = await fetch("/wifiscan");
				const data = await response.json();
				listWiFi(data);
			} catch (error) {
				console.log(error);
				setTimeout(getWiFiList, 5000);
			}
		}

		function listWiFi(data) {
			console.log(data);
			var list = document.getElementById("WiFiList");
			var h = "";
			data.map(function (WiFis) {
				h += `<div class="ssid" onclick="selectWiFi('${WiFis.ssid}')"><a href="#"><div class="${WiFis.wico}" title="${WiFis.quality}% (${WiFis.rssi} dBm)"><div class="${WiFis.pico}" title="${WiFis.ssid}.(${WiFis.bssid})">${WiFis.ssid}</div></div></a></div>\n`;
			});
			h += "<br>";
			list.innerHTML = h;
			setTimeout(getWiFiList, 5000);
		}
		// disable static input fields on toggle
		document.getElementById('static_enabled').onchange = function () {
			let new_style = this.checked ? null : "none";
			document.getElementById("wifi_static_div").style.display = new_style;
		};
		async function wifiConfig() {
			let static = document.getElementById('static_enabled').checked;
			var myObj = {
				ssid: document.getElementById('ssid').value,
				pwd: document.getElementById('pwd').value,
				static: static
			};
			if (static) {
				myObj = {
					...myObj,
					static_addr: document.getElementById('static_addr').value,
					static_gateway: document.getElementById('static_gateway').value,
					static_subnet: document.getElementById('static_subnet').value,
					static_dns1: document.getElementById('static_dns1').value,
					static_dns2: document.getElementById('static_dns2').value,
				};
			}
			await fetch("/savedSSIDs", {
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify(myObj)
			});
			var myObj = {
				hostname: document.getElementById('hostname').value,
				scanwifionstart: document.getElementById('scan_wifi_on_start').checked
			};
			await fetch("/wificonfig", {
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify(myObj)
			});
		}
		addEventListener("DOMContentLoaded", (event) => {
			getWiFiList();
			updateWifiFields();
			setupFullInterfaceLink();
		});

		// Show the full management interface's URL and offer a "copy to clipboard" button. Uses the
		// legacy execCommand('copy') rather than navigator.clipboard.writeText(), since the latter
		// requires a secure (HTTPS) context and ESPuino only serves plain HTTP. Whether this works inside
		// the OS's captive-portal sandbox (vs. a regular browser) is untested - so the URL always stays
		// visible/selectable as a reliable fallback regardless of whether the copy itself succeeds.
		//
		// Deliberately hardcoded rather than derived from location.host: while in the captive-portal flow,
		// the browser's address bar (and location.host) shows whatever probe hostname the OS resolved
		// through ESPuino's catch-all DNS (e.g. macOS/iOS use "captive.apple.com"), not the device's actual
		// IP. Copying a URL built from that would produce a link that resolves to the real apple.com (or
		// whichever host) once opened outside the captive session - not back to ESPuino. The AP's IP is a
		// fixed constant (see apIP in Wlan.cpp), so hardcoding it here is the robust choice.
		function setupFullInterfaceLink() {
			const urlField = document.getElementById("full-interface-url");
			urlField.value = "http://192.168.4.1/management.html";

			document.getElementById("copy-url-button").addEventListener("click", () => {
				const status = document.getElementById("copy-url-status");
				urlField.select();
				urlField.setSelectionRange(0, 99999);
				let copied = false;
				try {
					copied = document.execCommand("copy");
				} catch (error) {
					copied = false;
				}
				status.textContent = i18next.t(copied ? "wifi.fullInterface.copied" : "wifi.fullInterface.copyFailed");
			});
		}
		async function updateWifiFields() {
			let hostnameElem = document.getElementById("hostname");
			let scanWifiElem = document.getElementById("scan_wifi_on_start");
			let config = await (await fetch("/wificonfig")).json();
			if (config.hostname && config.hostname !== "") {
				hostnameElem.value = config.hostname;
				hostnameElem.defaultValue = config.hostname;
			}
			scanWifiElem.checked = config.scanwifionstart;
		}
	</script>
</body>

</html>
