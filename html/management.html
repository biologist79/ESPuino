	<style type="text/css">
		body {
			/* According to https://www.freecodecamp.org/news/css-media-queries-breakpoints-media-types-standard-resolutions-and-more
			 * the common minimal width is 320 px. -> 310 px + 5 px padding */
			min-width: 310px;
		}

		.nav-logo {
			margin-right: 5px;
		}

		.jstree-default .jstree-search {
			font-style: italic;
			color: #007bff;
			/* change searchresult theme-color to bootstrap blue */
			font-weight: bold;
		}

		.filetree {
			border: 1px solid black;
			margin: 0em 0em 1em 0em;
			overflow-y: scroll;
		}

		.filetree-size {
			height: 200px;
		}

		.slider-container {
			width: 100%;
			display: flex;
		}

		/* Without an explicit flex-basis, this item's width:100% is used as its basis - so when the row
		   overflows (icons + 100%) and has to shrink, it shrinks far more than the icon boxes do, leaving
		   the actual slider narrower than a plain input in the same column. Growing/shrinking from a 0
		   basis instead makes it simply fill whatever space the (fixed-size, see below) icons don't need. */
		.slider-container-inner {
			flex: 1 1 0;
			min-width: 0;
			padding-top: 10px;
			padding-left: 20px;
			padding-right: 20px;
			float: left;
		}

		/* float-end has no effect on a flex child (float is ignored for flex items) - these icon boxes
		   were relying on it for nothing; give them a real fixed size instead so they don't shrink either. */
		.slider-container > .float-end {
			flex: 0 0 auto;
		}

		.slider-value-badge {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-width: 2.6em;
			padding: 0.15em 0.5em;
			border-radius: 0.5em;
			background: var(--bs-tertiary-bg);
			border: 1px solid var(--bs-border-color);
			font-variant-numeric: tabular-nums;
			font-weight: 600;
		}

		.slider-step-row {
			display: flex;
			align-items: center;
			gap: 0.6em;
			width: 100%;
			margin-top: 0.5em;
			margin-bottom: 0.5em;
		}

		.slider-divider {
			margin: 0.75em 0;
			border: none;
			border-top: 1px solid var(--bs-border-color);
			opacity: 0.5;
		}

		.slider-value-row {
			display: flex;
			justify-content: flex-end;
			align-items: center;
			/* Matches .col-form-label's own top padding so the badge's text lines up with the label's. */
			padding-top: calc(0.375rem + 1px);
			margin-bottom: 0.6em;
		}

		.settings-group-card {
			border: 1px solid var(--bs-border-color);
			border-radius: 0.75rem;
			padding: 1rem 1.25rem;
		}

		.slider-step-row > .slider-container,
		.slider-step-row > .hue-slider,
		.slider-step-row > .sat-slider {
			flex: 1 1 0;
			min-width: 0;
		}

		.slider-step-btn {
			flex: 0 0 auto;
			width: 2.3em;
			height: 2.3em;
			border-radius: 50%;
			border: 1px solid var(--bs-border-color);
			background: var(--bs-tertiary-bg);
			color: var(--bs-body-color);
			display: inline-flex;
			align-items: center;
			justify-content: center;
			font-size: 1.1em;
			line-height: 1;
			padding: 0;
		}

		.slider-step-btn:hover {
			background: var(--bs-secondary-bg);
		}

		.slider-step-btn:active {
			background: var(--bs-border-color);
		}

		.slider.slider-horizontal {
			width: 100%;
		}

		.slider-handle {
			height: 30px;
			width: 30px;
			top: -5px;
		}

		.hue-slider .slider-track {
			background: linear-gradient(to right in hsl, #f00, #0f0, #0ff, #00f, #f00);
		}

		.hue-slider .slider-selection {
			/* hide the white selection that would hide the gradient */
			opacity: 0;
		}

		.sat-slider .slider-track {
			background: linear-gradient(to right in hsl, #000, #fff);
		}

		legend.scheduler-border {
			width: inherit;
			/* Or auto */
			padding: 0 10px;
			/* To give a bit of padding on the left and right */
			border-bottom: none;
		}

		.icon-pos {
			top: 0.3em;
			position: relative;
		}

		.filetree-container {
			position: relative;
		}

		.coverimage-container {
			object-fit: cover;
			max-width: 100%;
			height: 300px;
			margin: auto;
			display: block;
		}

		.ctrl-button-grp {
			margin: auto;
			display: block;
			text-align: center;
		}

		.ctrl-button {
			margin: 2px;
			padding: 10px;
		}

		.volume-button {
			width: 60px;
		}

		.overlay {
			z-index: 9;
			opacity: 0.8;
			background: #1a1919;
			height: 200px;
			display: none;
			width: 100%;
		}

		.progress-sm {
			height: 0.4rem !important;
		}

		.upload-progress-bar {
			height: 30px;
		}

		#SubTabContent.tab-content {
			display: flex;
		}

		#SubTabContent.tab-content>.tab-pane {
			display: block;
			/* undo "display: none;" */
			visibility: hidden;
			margin-right: -100%;
			width: 100%;
		}

		#SubTabContent.tab-content>.active {
			visibility: visible;
		}

		[data-visible="false"] {
			display: none;
		}

		.fas {
			padding-right: 0.25em;
		}

		#langSel {
			width: auto;
		}

		.bs-tooltip-top {
			width: 40px;
		}

		input::placeholder {
			color: #a2a6aa !important;
		}

		.menu-icon {
			width: 30px;
			text-align: center;
		}

		.container-fluid {
			padding-right: 0;
			padding-left: 5px;
		}

		/* Overwrite some Bootstrap styles (remove border around disabled buttons) */
		.btn.disabled {
			border-color: rgb(0, 0, 0, 0);
			/* Overwrite to have an invisible border */
			/* As copied from Botstrap buttons.scss */
			color: var(--bs-btn-disabled-color);
			pointer-events: none;
			background-color: var(--bs-btn-disabled-bg);
			opacity: var(--bs-btn-disabled-opacity);
		}

		.vakata-context {
			/* Make sure the jstree context menu is most top */
			z-index: 99999;
		}

		@keyframes heartbeat-pulse {
			0% {
				transform: scale(1);
			}

			30% {
				transform: scale(1.5);
			}

			100% {
				transform: scale(1);
			}
		}

		#connectionStatusIndicator {
			font-size: 1.4em;
		}

		#connectionStatusIndicator.heartbeat-pulse {
			display: inline-block;
			animation: heartbeat-pulse 0.3s ease-out;
		}

		/* text-success/text-danger are too dark/muted against the navbar's blue background */
		#connectionStatusIndicator.connection-ok {
			color: #4ade80;
		}

		#connectionStatusIndicator.connection-lost {
			color: #ff6b6b;
		}
	</style>
</head>

		/* General sub-tabs (Playback/RFID-Reader/Encoder/LED/Power): sliders inside a pane that's still
		   display:none at page load get measured (and their width baked in) by bootstrap-slider at the
		   wrong, too-narrow size, since only the first sub-tab is visible initially. Recompute once a
		   pane actually becomes visible instead of leaving that first, wrong measurement stuck. */
		$('#GeneralSubTab.nav-tabs a').on('shown.bs.tab', function (e) {
			$($(e.target).attr('href')).find('[data-provide="slider"]').each(function () {
				$(this).bootstrapSlider('relayout');

		});
		if (host == "") { // Not running on the device -> use the remote host
			host = remoteHost;
			console.log("Using remote host on " + remoteHost);
			var anchors = document.getElementsByTagName("img");
			for (var i = 0; i < anchors.length; i++) {
				anchors[i].src = "http://" + host + anchors[i].src.replace("file://", "");
			}
			var anchors = document.getElementsByTagName("form");
			for (var i = 0; i < anchors.length; i++) {
				anchors[i].action = "http://" + host + anchors[i].action.replace("file://", "");
			}
		}

		const toaster = {
			// remove all children, except the first (which is the template)
			clear: () => $('.toast:not(:first)').remove(),

			// render a toast with given message and bootstrap color class -- private closure
			toast: (() => {
				// the template for toasting is always the same
				const toastTemplate = $('#toast-template');
				// the container which contains the toasts is also always the same
				const toastContainer = $('#toaster');

				// return the actual function
				return (msg, colorClass) => {
					// check, if the same message is already showing
					if ($('div[data-msg="' + msg + '"]', toastContainer).length <= 0) {

						const toast = toastTemplate.clone();
						toast.find('.toast-body').html(msg);
						toast.attr('id', "");
						// storing the message in a data attribute to easier find it afterwards
						toast.attr('data-msg', msg);
						// set the correct class for the background color
						toast.addClass(colorClass || 'text-bg-primary');
						// when clicked or tapped onto, close it
						toast.click(() => toast.remove());

						toastContainer.append(toast);

						const toastBoostrap = bootstrap.Toast.getOrCreateInstance(toast);
						toastBoostrap.show();

						setTimeout(() => toast.remove(), 5500);
					}
				}
			})(),

			// predefined color classes for easier usage
			info: msg => toaster.toast(msg),
			success: msg => toaster.toast(msg, 'text-bg-success'),
			warning: msg => toaster.toast(msg, 'text-bg-warning'),
			error: msg => toaster.toast(msg, 'text-bg-danger')
		}


		i18next.use(i18nextHttpBackend).init({
			backend: {
				loadPath: "http://" + host + "/locales/{{lng}}.json"
			},
			load: 'languageOnly',
			debug: true,
			fallbackLng: 'en',
			returnObjects: true,
		}, (err, t) => {
			localize = locI18next.init(i18next);
			localize('body');
			toaster.clear();
			// change the language if we found it in the local storage
			const lang = localStorage.getItem("language");
			if (lang === null) {
				i18next.changeLanguage(language.split("-")[0]);
			} else {
				i18next.changeLanguage(lang);
			}
		});
		i18next.on('languageChanged', (lng) => {
			document.querySelector('#langSel').value = lng;
			if (localize) {
				localize('body');
				// (re)initialize all popover buttons to get correct translations in the popovers
				document.querySelectorAll('[data-bs-toggle="popover"]')
					.forEach(popoverButton => {
						new bootstrap.Popover(popoverButton, { html: true, trigger: 'focus' })
					});
			}
			$('#navMenu').removeClass("show"); // Hide the menu again
		});
		document.querySelector('#langSel').addEventListener('change', (e) => {
			const lang = e.target.value;
			console.log(lang);
			if (lang !== i18next.language) {
				toaster.clear();
				localStorage.setItem("language", lang);
				i18next.changeLanguage(lang);
			}
		});
		document.getElementById('trackProgressDiv').addEventListener('click', function (e) {
			var bounds = this.getBoundingClientRect();
			var max = bounds.width;
			var pos = e.pageX - bounds.left;
			var percent = Math.round(pos / max * 100);
			console.log('track progress percentage:', percent);
			var myObj = {
				"trackProgress": {
					posPercent: percent
				}
			};
			var myJSON = JSON.stringify(myObj);
			socket.send(myJSON);
		});

		function postRendering(event, data) {
			Object.keys(data.instance._model.data).forEach(function (key, index) {
				var cur = data.instance.get_node(data.instance._model.data[key]);
				var lastFolder = cur['id'].split('/').filter(function (el) {
					return el.trim().length > 0;
				}).pop();
				if ((/\.(mp3|ogg|oga|wav|wma|acc|flac|m4a|opus)$/i).test(lastFolder)) {
					data.instance.set_type(data.instance._model.data[key], 'audio');
				} else
					if ((/\.(m3u|m3u8|asx|pls)$/i).test(lastFolder)) {
						data.instance.set_type(data.instance._model.data[key], 'playlist');
					} else
						if ((/\.(png|jpg|jpeg|bmp|gif|webp)$/i).test(lastFolder)) {
							data.instance.set_type(data.instance._model.data[key], 'image');
							data.instance.disable_node(data.instance._model.data[key]);
						} else {
							if (data.instance._model.data[key]['type'] == "file") {
								data.instance.disable_node(data.instance._model.data[key]);
							}
						}
				data.instance.rename_node(data.instance._model.data[key], lastFolder);
			});
		}
		/* File Explorer functions begin*/
		var lastSelectedNodePath = "";
		$('#explorerTree').on('select_node.jstree', function (e, data) {
			$('input[name=fileOrUrl]').val(data.node.data.path);
			if (ActiveSubTab !== 'rfid-music-tab') {
				$('#SubTab.nav-tabs a[id="rfid-music-tab"]').tab('show');
			}
			if (data.node.type == "folder") {
				$('.option-folder').show();
				$('.option-file').hide();
				$('#playMode option').removeAttr('selected').filter('[value=3]').attr('selected', true);
			}
			if ((data.node.type == "audio") || (data.node.type == "playlist")) {
				$('.option-file').show();
				$('.option-folder').hide();
				$('#playMode option').removeAttr('selected').filter('[value=1]').attr('selected', true);
			}
			if (lastSelectedNodePath != data.node.data.path) {
				if (data.node.data.directory) {
					var ref = $('#explorerTree').jstree(true),
						sel = ref.get_selected();
					if (!sel.length) {
						return false;
					}
					sel = sel[0];
					var children = $("#explorerTree").jstree("get_children_dom", sel);
					/* refresh only, when there is no child -> possible not yet updated */
					if (children.length < 1) {
						refreshNode(sel);
					}
				}
				lastSelectedNodePath = data.node.data.path;
			}
		});
		/* Webradio (mode 8) needs a URL, not a file/folder path - prefill "http://" when switching
		   to it, and restore the file browser's current selection when switching away again.
		   MediaHub (mode 18) derives fileOrUrl entirely from the server dropdown, so it's made
		   read-only while that mode is selected instead of being hand-edited. */
		$('#playMode').on('change', function () {
			if (this.value === '8') {
				$('#fileOrUrl').val('http://');
				$('#fileOrUrl').prop('readonly', false);
				$('#mediaHubServerDiv').hide();
			} else if (this.value === '18') {
				$('#fileOrUrl').prop('readonly', true);
				$('#mediaHubServerDiv').show();
				updateFileOrUrlFromMediaHubServer();
			} else {
				$('#fileOrUrl').val(lastSelectedNodePath || '/');
				$('#fileOrUrl').prop('readonly', false);
				$('#mediaHubServerDiv').hide();
			}
		});
		function updateFileOrUrlFromMediaHubServer() {
			// the option's value is already "scheme://host:port" (see rebuildMediaHubServerList)
			let base = $('#mediaHubServerSelect').val();
			$('#fileOrUrl').val(base ? ('mediahub://' + base) : '');
		}
		$('#mediaHubServerSelect').on('change', updateFileOrUrlFromMediaHubServer);

		function doRest(path, callback, obj) {
			obj.url = path;
			obj.dataType = "json";
			obj.contentType = "application/json;charset=IBM437",
				obj.scriptCharset = "IBM437",
				obj.success = function (data, textStatus, jqXHR) {
					if (callback) {
						callback(data);
					}
				};
			obj.error = function (jqXHR, textStatus, errorThrown) {
								console.log("AJAX error: " + textStatus + ", " + errorThrown + ": " + obj.url);
				/*debugger; */
			};
			jQuery.ajax(obj);
		} /* doRest */

		function showSwitchModePrompt() {
			// Reuse the info modal to prompt for mode switch
			$('.modal-title').text(i18next.t('bt.switchmode.title'));
			$('.modal-body').html(i18next.t('bt.switchmode.prompt'));

			$('#modalInfoRefresh').hide();
			$('#modalRestartNow').show().text(i18next.t('bt.switchmode.button')).off('click').on('click', function () {
				setOperationMode(0, true);
			});
			new bootstrap.Modal(document.getElementById('modalInfo')).show();
		}

		function getData(path, callback) {
			doRest(path, callback, {
				method: "GET"
			});
		} /* getData */
		function deleteData(path, callback, _data) {
			doRest(path, callback, {
				method: "DELETE",
				data: _data
			});
		} /* deleteData */
		function patchData(path, callback, _data) {
			doRest(path, callback, {
				method: "PATCH",
				data: _data
			});
		} /* patchData */
		function postData(path, callback, _data) {
			doRest(path, callback, {
				method: "POST",
				data: _data
			});
		} /* postData */
		function putData(path, callback, _data) {
			doRest(path, callback, {
				method: "PUT",
				data: _data
			});
		} /* putData */
		async function restartDevice() {
			console.log("restart..");
			// Close any existing prompt/modal immediately
			try {
				const modalEl = document.getElementById('modalInfo');
				const modalInst = bootstrap.Modal.getInstance(modalEl);
				if (modalInst) modalInst.hide();
			} catch (e) { }
			await fetch("http://" + host + "/restart", {
				method: "POST"

			// Ensure modal buttons are in correct state for restart
			$('#modalRestartNow').hide();
			$('#modalInfoRefresh').show();

			$('.modal-body').html(i18next.t("restartinfo"));

			new bootstrap.Modal(document.getElementById('modalInfo')).show();

		async function shutdownDevice() {

			await fetch("http://" + host + "/shutdown", {

		/* Firmware Upload (OTA) */
		$('#firmwareUploadForm').submit(function (e) {
			e.preventDefault();
			if (!document.getElementById('firmwareUpload').files.length > 0) {
				alert(i18next.t("files.upload.selectFile"));
				return false;
			}
			console.log("firmware upload!");
			var data = new FormData(this);
			const startTime = new Date().getTime();
			let bytesTotal = 0;
			const fup = $('#firmwareUploadProgress');
			fup.show();
			$.ajax({
				url: '/update',
				type: 'POST',
				data: data,
				contentType: false,
				processData: false,
				xhr: function () {
					var xhr = new window.XMLHttpRequest();
					xhr.upload.addEventListener("progress", function (evt) {
						if (evt.lengthComputable) {
							const now = new Date().getTime();
							const percent = parseInt(evt.loaded * 100 / evt.total);
							const elapsed = (now - startTime) / 1000;
							bytesTotal = evt.total;
							let progressText = i18next.t("files.upload.timeCalc");
							if (elapsed) {
								const bps = evt.loaded / elapsed;
								const kbps = bps / 1024;
								const remaining = Math.round((evt.total - evt.loaded) / bps);
								const data = {
									percent: percent,
									remaining: {
										unit: (remaining > 60) ? i18next.t("files.upload.minutes", {
											count: Math.round(remaining / 60)
										}) : i18next.t("files.upload.seconds"),
										value: (remaining > 60) ? Math.round(remaining / 60) : ((remaining > 2) ? remaining : i18next.t("files.upload.fewSec"))
									},
									speed: kbps.toFixed(2)
								}
								progressText = i18next.t("files.upload.progress", data);
								console.log("Percent: " + percent + "%% " + kbps.toFixed(2) + " KB/s");
							}
							$(".progress-bar", fup).css('width', percent + "%");
							$(".label", fup).text(progressText);
						}
					}, false);
					fup.addClass('bg-primary bg-opacity-75');
					$('.progress-bar', fup).removeClass('bg-danger');
					return xhr;
				},
				success: function (data, textStatus, jqXHR) {
					const now = new Date().getTime();
					const elapsed = (now - startTime) / 1000;
					let transData = {
						elapsed: "00:00",
						speed: "0,00"
					};
					if (elapsed) {
						const bps = bytesTotal / elapsed;
						const kbps = bps / 1024;
						const date = new Date(null);
						date.setSeconds(elapsed);
						const timeText = date.toISOString().substr(11, 8);
						transData = {
							elapsed: timeText,
							speed: kbps.toFixed(2)
						};
					}
					console.log("Firmware upload success (" + transData.elapsed + ", " + transData.speed + " KB/s): " + textStatus);
					const progressText = i18next.t("files.upload.success", transData);
					$(".label", fup).text(progressText);
					document.getElementById('uploaded_file').value = '';
					document.getElementById('uploaded_file_text').innerHTML = '';
					restartDevice();
				},
				error: function (request, status, error) {
					console.log("Firmware upload ERROR!", request);
					fup.removeClass('bg-primary bg-opacity-75');
					$('.progress-bar', fup).addClass('bg-danger');
					$(".label", fup).text(i18next.t("files.upload.error") + ": " + request.statusText);
					toaster.error(i18next.t("files.upload.error") + ': ' + request.statusText);
				}
			});
		});
		/* Firmware Update via GitHub (biologist79/ESPuino-Firmware) */
		const GITHUB_FW_REPO = "biologist79/ESPuino-Firmware";
		let githubFirmwareInitialized = false;
		let githubPlatform = '';

		function showGithubUpdateUnavailable(text) {
			$('#githubUpdateUnavailableText').text(text).show();
		}

		async function initGithubFirmwareUpdate() {
			if (githubFirmwareInitialized) {
				return;
			}
			githubFirmwareInitialized = true;
			try {
				let info = await (await fetch("http://" + host + "/info?section=software")).json();
				const sw = info.software;
				if (!sw.otaSupported) {
					showGithubUpdateUnavailable(i18next.t("tools.fwupdate.github.notAvailableOta"));
					return;
				}
				if (sw.customBuild) {
					showGithubUpdateUnavailable(i18next.t("tools.fwupdate.github.notAvailableCustomBuild"));
					return;
				}
				githubPlatform = sw.platform;
				$('#githubUpdateAvailable').show();
				$('#githubCheckButton').on('click', function () {
					checkGithubFirmwareBuilds();
				});
			} catch (e) {
				console.log("Could not fetch software info for github firmware update", e);
			}
		}

		async function checkGithubFirmwareBuilds() {
			const branch = $('#githubBranchSel').val();
			// firmware repo languages are DE/EN/FR, matching i18next's 2-letter codes
			const lang = (i18next.language || 'en').toUpperCase();
			const path = `Firmwares/${branch}/${githubPlatform}/firmware-${lang}.bin`;
			const list = $('#githubBuildList');
			list.empty().append($('<li class="list-group-item"></li>').text(i18next.t("tools.fwupdate.github.searching")));
			new bootstrap.Modal(document.getElementById('githubBuildListModal')).show();
			try {
				const resp = await fetch(`https://api.github.com/repos/${GITHUB_FW_REPO}/commits?path=${encodeURIComponent(path)}&per_page=10&sha=main`);
				if (!resp.ok) {
					throw new Error(resp.statusText);
				}
				const commits = await resp.json();
				list.empty();
				if (!commits.length) {
					list.append($('<li class="list-group-item"></li>').text(i18next.t("tools.fwupdate.github.noBuilds")));
					return;
				}
				commits.forEach(function (c) {
					const date = new Date(c.commit.author.date).toLocaleString();
					// commit message looks like "Firmware built from commit biologist79/ESPuino@<sha>" -
					// that sha is the original ESPuino commit, not this (firmware repo's own) commit
					const match = /ESPuino@([0-9a-f]{7,40})/.exec(c.commit.message);
					const fullSha = match ? match[1] : null;
					const commitShort = (fullSha || c.sha).substring(0, 10);
					const label = i18next.t("tools.fwupdate.github.buildEntry", { date: date });
					const li = $('<li class="list-group-item d-flex justify-content-between align-items-center"></li>');
					const textSpan = $('<span></span>').append(document.createTextNode(label + " "));
					if (fullSha) {
						const commitLink = $('<a target="_blank" rel="noopener noreferrer"></a>')
							.attr('href', `https://github.com/biologist79/ESPuino/commit/${fullSha}`)
							.text(commitShort);
						textSpan.append(commitLink);
						// Fetch the ESPuino commit's own message to show as a hover tooltip. Fire and
						// forget - don't block rendering the list on it, and silently skip on failure
						// (e.g. GitHub API rate-limit) since the tooltip is a nice-to-have, not essential.
						fetch(`https://api.github.com/repos/biologist79/ESPuino/commits/${fullSha}`)
							.then(r => r.ok ? r.json() : null)
							.then(data => {
								if (data && data.commit && data.commit.message) {
									commitLink.attr('title', data.commit.message);
								}
							})
							.catch(() => { });
					} else {
						textSpan.append(document.createTextNode(commitShort));
					}
					li.append(textSpan);
					const btn = $('<button type="button" class="btn btn-sm btn-primary"></button>').text(i18next.t("tools.fwupdate.github.installButton"));
					btn.on('click', function () {
						const prompt = i18next.t("tools.fwupdate.github.installPrompt", { date: date, commit: commitShort, platform: githubPlatform, branch: branch, language: lang });
						if (confirm(prompt)) {
							installGithubFirmware(c.sha, path);
						}
					});
					li.append(btn);
					list.append(li);
				});
			} catch (e) {
				list.empty().append($('<li class="list-group-item text-danger"></li>').text(i18next.t("tools.fwupdate.github.fetchError")));
				console.log("Error fetching github firmware builds", e);
			}
		}

		async function installGithubFirmware(sha, path) {
			const rawUrl = `https://raw.githubusercontent.com/${GITHUB_FW_REPO}/${sha}/${path}`;
			const gup = $('#githubUpdateProgress');
			gup.show().addClass('bg-primary bg-opacity-75');
			$('.progress-bar', gup).removeClass('bg-danger').css('width', '0%');
			$(".label", gup).text(i18next.t("files.upload.timeCalc"));
			let blob;
			try {
				const blobResp = await fetch(rawUrl);
				if (!blobResp.ok) {
					throw new Error(blobResp.statusText);
				}
				blob = await blobResp.blob();
			} catch (e) {
				gup.removeClass('bg-primary bg-opacity-75');
				$('.progress-bar', gup).addClass('bg-danger');
				$(".label", gup).text(i18next.t("tools.fwupdate.github.fetchError"));
				toaster.error(i18next.t("tools.fwupdate.github.fetchError"));
				console.log("Error downloading github firmware", e);
				return;
			}
			const data = new FormData();
			data.append('firmwareUpload', blob, 'firmware.bin');
			const startTime = new Date().getTime();
			$.ajax({
				url: '/update',
				type: 'POST',
				data: data,
				contentType: false,
				processData: false,
				xhr: function () {
					var xhr = new window.XMLHttpRequest();
					xhr.upload.addEventListener("progress", function (evt) {
						if (evt.lengthComputable) {
							const now = new Date().getTime();
							const percent = parseInt(evt.loaded * 100 / evt.total);
							const elapsed = (now - startTime) / 1000;
							let progressText = i18next.t("files.upload.timeCalc");
							if (elapsed) {
								const bps = evt.loaded / elapsed;
								const kbps = bps / 1024;
								const remaining = Math.round((evt.total - evt.loaded) / bps);
								progressText = i18next.t("files.upload.progress", {
									percent: percent,
									remaining: {
										unit: (remaining > 60) ? i18next.t("files.upload.minutes", { count: Math.round(remaining / 60) }) : i18next.t("files.upload.seconds"),
										value: (remaining > 60) ? Math.round(remaining / 60) : ((remaining > 2) ? remaining : i18next.t("files.upload.fewSec"))
									},
									speed: kbps.toFixed(2)
								});
							}
							$(".progress-bar", gup).css('width', percent + "%");
							$(".label", gup).text(progressText);
						}
					}, false);
					return xhr;
				},
				success: function () {
					$(".label", gup).text(i18next.t("files.upload.success", { elapsed: "00:00", speed: "0,00" }));
					restartDevice();
				},
				error: function (request) {
					gup.removeClass('bg-primary bg-opacity-75');
					$('.progress-bar', gup).addClass('bg-danger');
					$(".label", gup).text(i18next.t("files.upload.error") + ": " + request.statusText);
					toaster.error(i18next.t("files.upload.error") + ': ' + request.statusText);
				}
			});
		}
		/* File Upload */
		// Each selected file is sent as its own raw (application/octet-stream)
		// POST instead of bundling the whole batch into one multipart/form-data
		// request - server side (explorerHandleFileUpload() in Web.cpp) never has
		// to parse MIME boundaries, which measurably improved throughput.
		$('#explorerUploadForm').submit(function (e) {
			e.preventDefault();
			console.log("Upload!");
			var ref = $('#explorerTree').jstree(true),
				sel = ref.get_selected(),
				path = "/";
			if (!sel.length) {
				alert(i18next.t("files.upload.selectFolder"));
				return false;
			}
			const fileInput = document.getElementById('uploaded_file');
			if (!(fileInput.files.length > 0)) {
				alert(i18next.t("files.upload.selectFile"));
				return false;
			}
			sel = sel[0];
			selectedNode = ref.get_node(sel);
			if (selectedNode.data.directory) {
				path = selectedNode.data.path
				console.log("Directory: " + path);
			} else {
				/* remap sel to parent folder */
				sel = ref.get_node(ref.get_parent(sel));
				path = parentNode.data.path;
				console.log("Parent path: " + path);
			}

			const files = Array.from(fileInput.files);
			const bytesTotal = files.reduce((sum, f) => sum + f.size, 0);
			const startTime = new Date().getTime();
			const eup = $("#explorerUploadProgress");
			eup.addClass('bg-primary bg-opacity-75');
			$('.progress-bar', eup).removeClass('bg-danger');
			let bytesDoneBefore = 0;

			function showProgress(loaded) {
				const now = new Date().getTime();
				const percent = bytesTotal ? parseInt(loaded * 100 / bytesTotal) : 100;
				const elapsed = (now - startTime) / 1000;
				let progressText = i18next.t("files.upload.timeCalc");
				if (elapsed && loaded) {
					const bps = loaded / elapsed;
					const kbps = bps / 1024;
					const remaining = Math.round((bytesTotal - loaded) / bps);
					const data = {
						percent: percent,
						remaining: {
							unit: (remaining > 60) ? i18next.t("files.upload.minutes", {
								count: Math.round(remaining / 60)
							}) : i18next.t("files.upload.seconds"),
							value: (remaining > 60) ? Math.round(remaining / 60) : ((remaining > 2) ? remaining : i18next.t("files.upload.fewSec"))
						},
						speed: kbps.toFixed(2)
					}
					progressText = i18next.t("files.upload.progress", data);
				}
				$('.progress-bar', eup).css('width', percent + "%");
				$('.label', eup).text(progressText);
			}

			function uploadFailed(statusText) {
				console.log("Upload ERROR!", statusText);
				eup.removeClass('bg-primary bg-opacity-75');
				$('.progress-bar', eup).addClass('bg-danger');
				$('.label', eup).text(i18next.t("files.upload.error") + ": " + statusText);
				toaster.error(i18next.t("files.upload.error") + ": " + statusText);
			}

			function uploadDone() {
				const now = new Date().getTime();
				const elapsed = (now - startTime) / 1000;
				let transData = {
					elapsed: "00:00",
					speed: "0,00"
				};
				if (elapsed) {
					const bps = bytesTotal / elapsed;
					const kbps = bps / 1024;
					const date = new Date(null);
					date.setSeconds(elapsed);
					const timeText = date.toISOString().substr(11, 8);
					transData = {
						elapsed: timeText,
						speed: kbps.toFixed(2)
					};
				}
				console.log("Upload success (" + transData.elapsed + ", " + transData.speed + " KB/s)");
				$('.label', eup).text(i18next.t("files.upload.success", transData));
				fileInput.value = '';
				document.getElementById('uploaded_file_text').innerHTML = '';
				getData("http://" + host + "/explorer?path=" + path, function (data) {
					/* We now have data! */
					deleteChildrenNodes(sel);
					addFileDirectory(sel, data);
					ref.open_node(sel);
				});
			}

			// Files upload one at a time (the shared double-buffer/writer-task
			// on the ESPuino only supports one active upload at a time) - each as
			// its own raw PUT, with the target path (folder + filename) passed as
			// a query param since a raw body carries no per-part filename.
			function uploadNext(idx) {
				if (idx >= files.length) {
					uploadDone();
					return;
				}
				const file = files[idx];
				const targetPath = (path.endsWith('/') ? path : path + '/') + file.name;
				const xhr = new XMLHttpRequest();
				xhr.open('POST', '/explorer?path=' + encodeURIComponent(targetPath));
				xhr.setRequestHeader('Content-Type', 'application/octet-stream');
				xhr.upload.addEventListener('progress', function (evt) {
					if (evt.lengthComputable) {
						showProgress(bytesDoneBefore + evt.loaded);
					}
				}, false);
				xhr.onload = function () {
					if (xhr.status >= 200 && xhr.status < 300) {
						bytesDoneBefore += file.size;
						uploadNext(idx + 1);
					} else {
						uploadFailed(xhr.statusText || ("HTTP " + xhr.status));
					}
				};
				xhr.onerror = function () {
					uploadFailed(i18next.t("files.upload.error"));
				};
				xhr.send(file);
			}
			uploadNext(0);
		});
		/* File Delete */
		function handleDeleteData(nodeId) {
			var selectedNodes = $('#explorerTree').jstree("get_selected", true);
			$.each(selectedNodes, function () {
				var ref = $('#explorerTree').jstree(true);
				var node = ref.get_node(this.id);
				console.log("call delete request: " + node.data.path);
				deleteData("http://" + host + "/explorer?path=" + encodeURIComponent(node.data.path));
			});
		}

		function sortData(data) {
			var sortMode = 3; // Default: natural case-insensitive
			try {
				sortMode = window.settings.playlist.sortMode;
			} catch (error) {
				// Nothing to do
			}
			data.sort(function (a, b) {
				// Make sure directories are always listed first
				if (a.dir && !b.dir) {
					return -1;
				}
				if (!a.dir && b.dir) {
					return 1;
				}
				switch (sortMode) {
					case 1: // strcmp - standard string comparison
						if (a.name < b.name) {
							return -1;
						}
						if (a.name > b.name) {
							return 1;
						}
						return 0;
					case 2: // strnatcmp - natural case-sensitive
						return natcompare(a.name, b.name);
						break;
					case 3: // strnatcasecmp - natural case-insensitive
					default:
						return natcompare(a.name.toLowerCase(), b.name.toLowerCase());
						break;
				}
			});
		}

		function createChild(nodeId, data) {
			var ref = $('#explorerTree').jstree(true);
			var node = ref.get_node(nodeId);
			var parentNodePath = node.data.path;
			/* In case of root node remove leading '/' to avoid '//' */
			if (parentNodePath == "/") {
				parentNodePath = "";
			}
			var child = {
				text: data.name,
				type: getType(data),
				data: {
					path: parentNodePath + "/" + data.name,
					directory: data.dir
				}
			};
			return child;
		}

		function deleteChildrenNodes(nodeId) {
			var ref = $('#explorerTree').jstree(true);
			var children = $("#explorerTree").jstree("get_children_dom", nodeId);
			for (var i = 0; i < children.length; i++) {
				ref.delete_node(children[i].id);
			}
		}

		function refreshNode(nodeId) {
			var ref = $('#explorerTree').jstree(true);
			var node = ref.get_node(nodeId);
			getData("http://" + host + "/explorer?path=" + encodeURIComponent(node.data.path), function (data) {
				/* We now have data! */
				// If root node and first element has root flag, skip it (volume label)
				var startIndex = 0;
				if (node.data.path === "/" && data.length > 0 && data[0].root === "sd") {
					startIndex = 1;
				}
				deleteChildrenNodes(nodeId);
				// Pass only actual children (skip volume label if present)
				addFileDirectory(nodeId, data.slice(startIndex));
				ref.open_node(nodeId);
			});
		}

		function getType(data) {
			var type = "";
			if (data.dir) {
				type = "folder";
			} else if ((/\.(mp3|ogg|oga|wav|wma|acc|m4a|flac|opus)$/i).test(data.name)) {
				type = "audio";
			} else if ((/\.(m3u|m3u8|asx|pls)$/i).test(data.name)) {
				type = "playlist";
			} else if ((/\.(png|jpg|jpeg|bmp|gif|webp)$/i).test(data.name)) {
				type = "image";
			} else {
				type = "file";
			}
			return type;
		}

		function addFileDirectory(parent, data) {
			sortData(data);
			var ref = $('#explorerTree').jstree(true);
			for (var i = 0; i < data.length; i++) {
				console.log("Create Node");
				ref.create_node(parent, createChild(parent, data[i]));
			}
		} /* addFileDirectory */
		function buildFileSystemTree(path, darkMode) {
			if (darkMode == true) {
				var theme = "default-dark";
			} else {
				var theme = "default";
			}
			$('#explorerTree').jstree({
				"core": {
					"check_callback": true,
					'force_text': true,
					'strings': {
						"Loading ...": () => i18next.t("files.loading")
					},
					"themes": {
						"name": theme,
						"stripes": true
					},
					'data': {
						text: '/',
						state: {
							opened: true,
							selected: true
						},
						type: 'sdcard',
						children: [],
						data: {
							path: '/',
							directory: true
						}
					}
				},
				'types': {
					'sdcard': {
						'icon': "fa fa-sd-card"
					},
					'folder': {
						'icon': "fa fa-folder"
					},
					'file': {
						'icon': "fa fa-file"
					},
					'audio': {
						'icon': "fa fa-file-audio"
					},
					'playlist': {
						'icon': "fa fa-file-alt"
					},
					'image': {
						'icon': "fa fa-file-image"
					},
					'default': {
						'icon': "fa fa-folder"
					}
				},
				plugins: ["contextmenu", "themes", "types", "search"],
				"search": {
					"case_sensitive": false,
					"show_only_matches": true
				},
				contextmenu: {
					items: function (nodeId) {
						var ref = $('#explorerTree').jstree(true);
						var node = ref.get_node(nodeId);
						var items = {};
						if (node.data.directory) {
							items.createDir = {
								label: () => i18next.t("files.context.newFolder"),
								icon: "fas fa-folder",
								action: function (x) {
									var childNode = ref.create_node(nodeId, {
										text: () => i18next.t("files.context.newFolder"),
										type: "folder"
									});
									if (childNode) {
										ref.edit(childNode, null, function (childNode, status) {
											putData("http://" + host + "/explorer?path=" + encodeURIComponent(node.data.path) + "/" + encodeURIComponent(childNode.text));
											refreshNode(nodeId);
										});
									}
								}
							};
						}
						/* Play */
						items.play = {
							label: () => i18next.t("files.context.play"),
							icon: "fas fa-play",
							action: function (x) {
								var playMode = 1;
								if (node.data.directory) {
									playMode = 5;
								} else {
									if ((/\.(m3u|m3u8|asx|pls)$/i).test(node.data.path)) {
										playMode = 11;
									}
								}
								postData("http://" + host + "/exploreraudio?path=" + encodeURIComponent(node.data.path) + "&playmode=" + playMode);
							}
						};
						/* Refresh */
						items.refresh = {
							label: () => i18next.t("files.context.refresh"),
							icon: "fas fa-sync",
							action: function (x) {
								refreshNode(nodeId);
							}
						};
						/* Delete */
						items.delete = {
							label: () => i18next.t("files.context.delete"),
							icon: "fas fa-trash",
							action: function (x) {
								handleDeleteData(nodeId);
								refreshNode(ref.get_parent(nodeId));
							}
						};
						/* Rename */
						items.rename = {
							label: () => i18next.t("files.context.rename"),
							icon: "fas fa-edit",
							action: function (x) {
								var srcPath = node.data.path;
								ref.edit(nodeId, null, function (node, status) {
									node.data.path = node.data.path.substring(0, node.data.path.lastIndexOf("/") + 1) + node.text;
									patchData("http://" + host + "/explorer?srcpath=" + encodeURIComponent(srcPath) + "&dstpath=" + encodeURIComponent(node.data.path));
									refreshNode(ref.get_parent(nodeId));
								});
							}
						};
						/* Download */
						if (!node.data.directory) {
							items.download = {
								label: () => i18next.t("files.context.download"),
								icon: "fas fa-download",
								action: function (x) {
									uri = "http://" + host + "/explorerdownload?path=" + encodeURIComponent(node.data.path);
									console.log("download file: " + node.data.path);
									var anchor = document.createElement('a');
									anchor.href = uri;
									anchor.target = '_blank';
									anchor.download = node.data.path;
									anchor.click();
									document.body.removeChild(document.body.lastElementChild);
								}
							}
						};
						return items;
					}
				}
			});
			if (path.length == 0) {
				return;
			}
			getData("http://" + host + "/explorer?path=/", function (data) {
				/* We now have data! */
				$('#explorerTree').jstree(true).settings.core.data.children = [];

				// If first element has root flag, use it to rename root node and remove it from data
				if (data.length > 0 && data[0].root === "sd") {
					// Rename root node with volume label from backend
					var tree = $('#explorerTree').jstree(true);
					tree.settings.core.data.text = data[0].name;
					var rootNode = tree.get_node(tree.get_container().children('ul').children('li')[0]);
					if (rootNode) {
						tree.rename_node(rootNode, data[0].name);
					}
					// Remove volume label from data array before sorting
					data = data.slice(1);
				}

				sortData(data);
				for (var i = 0; i < data.length; i++) {
					var newChild = {
						text: data[i].name,
						type: getType(data[i]),
						data: {
							path: "/" + data[i].name,
							directory: data[i].dir
						},
						children: []
					};
					$('#explorerTree').jstree(true).settings.core.data.children.push(newChild);
				}
				$("#explorerTree").jstree(true).refresh();
			});

		function updateOperationModeIndicator(opmode) {
			const btStartSource = document.getElementById('btStartSource');
			const btStartSink = document.getElementById('btStartSink');

			// OPMODE_NORMAL = 0, OPMODE_BLUETOOTH_SINK = 1, OPMODE_BLUETOOTH_SOURCE = 2
			if (opmode === 0) {

				btStartSource.classList.remove('border', 'border-primary', 'border-3', 'rounded', 'p-3', 'bg-body-secondary');
				btStartSink.classList.remove('border', 'border-primary', 'border-3', 'rounded', 'p-3', 'bg-body-secondary');

			} else if (opmode === 1) {

				btStartSource.classList.remove('border', 'border-primary', 'border-3', 'rounded', 'p-3', 'bg-body-secondary');
				btStartSink.classList.add('border', 'border-primary', 'border-3', 'rounded', 'p-3', 'bg-body-secondary');

				btStartSink.classList.remove('border', 'border-primary', 'border-3', 'rounded', 'p-3', 'bg-body-secondary');
				btStartSource.classList.add('border', 'border-primary', 'border-3', 'rounded', 'p-3', 'bg-body-secondary');

		} function connect() {
			socket = new WebSocket("ws://" + host + "/ws");
			socket.onopen = function () {
				clearInterval(pingInterval);
				clearInterval(getTrackProgressInterval);
				pingInterval = setInterval(ping, 3000);
				setTrackProgressInterval = setInterval(getTrackProgress, 1000);
				// arm the watchdog now too, so a connection that dies before its first pong
				// arrives is still caught (not just ones that were alive at some point)
				armConnectionWatchdog();
				// clear old socket messages
				socket.sendBuffer = [];
				socket.send('{"settings":{"settings":"settings"}}'); // request settings
				socket.send('{"ssids":{"ssids":"ssids"}}'); // get ssids
				socket.send('{"trackinfo":{"trackinfo":"trackinfo"}}'); // get trackinfo
				socket.send('{"coverimg":{"coverimg":"coverimg"}}'); // get cover image
			};
			socket.onclose = function (e) {
				console.log('Socket is closed. Reconnect will be attempted in 5 seconds.', e.reason);
				socket = null;
				// stop ping()/getTrackProgress() - otherwise they keep firing against a null
				// socket (or a dead server) until the reconnect below succeeds and re-arms them
				clearInterval(pingInterval);
				clearInterval(getTrackProgressInterval);
				// a definitive close is known for certain - mark it right away instead of
				// waiting for the watchdog timeout below
				setConnectionStatus(false);
				setTimeout(function () {
					connect();
				}, 5000);
			};
			socket.onerror = function (err) {
				console.error('Socket encountered error: ', err.message, 'Closing socket');
			};
			socket.onmessage = function (event) {
				var socketMsg = JSON.parse(event.data);
				console.log(socketMsg);
				if (socketMsg.rfidId != null) {
					document.getElementById('rfidIdMusic').value = socketMsg.rfidId;
					toaster.info(i18next.t("toast.rfidDetect", {
						rfidId: socketMsg.rfidId
					}));
					$("#rfidIdMusic").effect("highlight", {
						color: "#abf5af"
					}, 3000);
					if (toolsTabActive) {
						rebuildRFIDList();
					}
				}
				if ("status" in socketMsg) {
					if (socketMsg.status == "ok") {
						toaster.success(i18next.t("toast.success"));
					}
					if (socketMsg.status == "dropout") {
						toaster.warning(i18next.t("toast.dropout"));
					}
					if (socketMsg.status == "not_allowed_in_current_mode") {
						showSwitchModePrompt();
					}
				}
				if ("pong" in socketMsg) {
					if (socketMsg.pong == 'pong') {
						pong();
					}
				}
				if ("opmode" in socketMsg) {
					currentOpMode = socketMsg.opmode;
					updateOperationModeIndicator(socketMsg.opmode);
				}
				if ("volume" in socketMsg) {
					volumeSlider.setValue(parseInt(socketMsg.volume));
				}
				if ("trackinfo" in socketMsg) {
					document.getElementById('track').innerHTML = socketMsg.trackinfo.name;
					setTrackProgress(socketMsg.trackinfo);
					var btnTrackPlayPause = document.getElementById('nav-btn-play');
					if (socketMsg.trackinfo.pausePlay) {
						btnTrackPlayPause.innerHTML = '<i id="ico-play-pause" class="fas fa-lg fa-play"></i>';
					} else {
						btnTrackPlayPause.innerHTML = '<i id="ico-play-pause" class="fas fa-lg fa-pause"></i>';
					}
					var btnTrackFirst = document.getElementById('nav-btn-first');
					var btnTrackPrev = document.getElementById('nav-btn-prev');
					if (socketMsg.trackinfo.currentTrackNumber <= 1) {
						btnTrackFirst.classList.add("disabled");
						btnTrackPrev.classList.add("disabled");
					} else {
						btnTrackFirst.classList.remove("disabled");
						btnTrackPrev.classList.remove("disabled");
					}
					var btnTrackLast = document.getElementById('nav-btn-last');
					var btnTrackNext = document.getElementById('nav-btn-next');
					if (socketMsg.trackinfo.currentTrackNumber >= socketMsg.trackinfo.numberOfTracks) {
						btnTrackLast.classList.add("disabled");
						btnTrackNext.classList.add("disabled");
					} else {
						btnTrackLast.classList.remove("disabled");
						btnTrackNext.classList.remove("disabled");
					}
				}
				if ("trackProgress" in socketMsg) {
					setTrackProgress(socketMsg.trackProgress);
				}
				if ("coverimg" in socketMsg) {
					document.getElementById('coverimg').src = "http://" + host + "/cover?" + new Date().getTime();
				}
				if ("settings" in socketMsg) {
					fillSettings(socketMsg.settings);
				}
				if ("bt_scan" in socketMsg) {
					if (socketMsg.bt_scan === 'complete') {
						resetBtScanButton();
						fetchBtResults();
					}
				}
			};
		}

		// Adds a live value badge and circular +/- step buttons around a bootstrap-slider input.
		// Works for both the icon-flanked ".slider-container" sliders and the icon-less
		// ".hue-slider"/".sat-slider" ones; existing decorative icons are removed since the new
		// buttons take over that role.
		const sliderStepperIds = [];

		function Slider_AddStepper(id, step) {
			const input = document.getElementById(id);
			if (!input) {
				return;
			}
			const container = input.closest('.slider-container') || input.closest('.hue-slider') || input.closest('.sat-slider');
			if (!container) {
				return;
			}
			container.querySelectorAll(':scope > .float-end').forEach((el) => el.remove());

			step = step || parseFloat(input.getAttribute('data-slider-step')) || 1;
			const decimals = (String(step).split('.')[1] || '').length;

			const badge = document.createElement('span');
			badge.className = 'slider-value-badge';
			badge.id = id + 'Badge';

			const row = container.closest('.row');
			const labelCol = row ? row.querySelector(':scope > .col-sm-4') : null;
			const sliderCol = row ? row.querySelector(':scope > .col-sm-8') : null;

			if (row && labelCol && sliderCol) {
				// The label/value grid split (col-sm-4 + col-sm-8) leaves the track only 2/3 of the
				// row's width even on desktop, and behaves inconsistently across breakpoints on
				// mobile. Free the slider from it entirely: label + badge share one full-width line,
				// the slider (and its buttons) get the full width on the line below, on every screen size.
				const headerRow = document.createElement('div');
				// flex-start rather than center: on narrow widths the label can wrap onto two lines,
				// and centering would then align the badge to the label block's vertical middle
				// instead of its first line.
				headerRow.className = 'd-flex align-items-start justify-content-between gap-2 mb-2';
				labelCol.classList.remove('col-sm-4');
				headerRow.appendChild(labelCol);
				headerRow.appendChild(badge);

				while (sliderCol.firstChild) {
					row.insertBefore(sliderCol.firstChild, sliderCol);
				}
				sliderCol.remove();
				row.classList.remove('row', 'align-items-center', 'align-items-start');
				row.insertBefore(headerRow, row.firstChild);
			} else {
				// No label/value grid to unwrap (e.g. the equalizer modal, already full-width) -
				// just float the badge above the slider.
				const badgeRow = document.createElement('div');
				badgeRow.className = 'slider-value-row';
				badgeRow.appendChild(badge);
				container.parentNode.insertBefore(badgeRow, container);
			}

			// Thin divider between consecutive sliders in the same group (e.g. Volume, LED
			// brightness) - only if the immediately preceding sibling is itself an already-enhanced slider.
			if (row) {
				const prevSibling = row.previousElementSibling;
				if (prevSibling && prevSibling.querySelector('.slider-step-row, .hue-slider, .sat-slider')) {
					const hr = document.createElement('hr');
					hr.className = 'slider-divider';
					row.parentNode.insertBefore(hr, row);
				}
			}

			const stepRow = document.createElement('div');
			stepRow.className = 'slider-step-row';
			container.parentNode.insertBefore(stepRow, container);

			const makeButton = (symbol, delta) => {
				const btn = document.createElement('button');
				btn.type = 'button';
				btn.className = 'slider-step-btn';
				btn.textContent = symbol;
				btn.setAttribute('aria-label', delta > 0 ? 'increase' : 'decrease');
				btn.addEventListener('click', () => {
					const min = parseFloat(input.getAttribute('data-slider-min'));
					const max = parseFloat(input.getAttribute('data-slider-max'));
					let val = parseFloat($(input).bootstrapSlider('getValue')) + delta;
					if (!isNaN(min)) {
						val = Math.max(min, val);
					}
					if (!isNaN(max)) {
						val = Math.min(max, val);
					}
					val = parseFloat(val.toFixed(decimals));
					$(input).bootstrapSlider('setValue', val, true, true);
					badge.textContent = val;
				});
				return btn;
			};

			stepRow.appendChild(makeButton('−', -step));
			stepRow.appendChild(container);
			stepRow.appendChild(makeButton('+', step));

			$(input).on('change slide', function () {
				badge.textContent = $(input).bootstrapSlider('getValue');
			});

			badge.textContent = input.value;
			sliderStepperIds.push(id);
		}

		// fillSettings() populates sliders via bootstrapSlider('setValue', ...), which doesn't
		// necessarily fire a 'change'/'slide' event - call this once afterwards to sync all badges.
		function Slider_SyncAllBadges() {
			sliderStepperIds.forEach((id) => {
				const input = document.getElementById(id);
				const badge = document.getElementById(id + 'Badge');
				if (input && badge) {
					badge.textContent = $(input).bootstrapSlider('getValue');
				}
			});
		}

		function setConnectionStatus(connected) {
			const icon = $('#connectionStatusIndicator');
			icon.toggleClass('connection-ok', connected).toggleClass('connection-lost', !connected);
			icon.attr('title', i18next.t(connected ? "status.connected" : "status.disconnected"));
		}

		function armConnectionWatchdog() {
			// called on a positive confirmation (a pong, or having just connected) - the
			// connection is known good right now, so mark it OK and give it a fresh window
			// before considering it stale again
			setConnectionStatus(true);
			clearTimeout(tm);
			tm = setTimeout(function () {
				setConnectionStatus(false);
			}, 5000);
		}

		function pong() {
			armConnectionWatchdog();
			// brief pulse on the heartbeat icon to show a pong actually just came in - remove
			// the class first and force a reflow so the animation restarts even if the previous
			// pulse (3s ago) already finished and left the class in place
			const icon = document.getElementById('connectionStatusIndicator');
			icon.classList.remove('heartbeat-pulse');
			void icon.offsetWidth;
			icon.classList.add('heartbeat-pulse');
		}

		function removeTrSlash(str) {
			if (str.substr(-1) === '/') {
				return str.substr(0, str.length - 1);
			}
			return str;
		}

		function buildMqttTopic(base, device, topic, isState) {
			var dev = device && device.length ? device : (document.getElementById('mqttClientId') ? document.getElementById('mqttClientId').value : 'UNKNOWN');
			var setterToken = 'set';
			if (base && base.length) {
				return base + '/' + dev + '/' + topic + (isState ? '' : '/' + setterToken);
			} else {
				return dev + '/' + topic + (isState ? '' : '/' + setterToken);
			}
		}

		function updateMqttTopicsPreview() {
			// Create preview UI if not present (helps when management.html wasn't updated)
			var previewEl = document.getElementById('mqttTopicsPreview');
			if (!previewEl) {
				var field = document.createElement('fieldset');
				field.className = 'mb-3';
				var leg = document.createElement('legend');
				leg.setAttribute('data-i18n', 'mqtt.topics.preview');
				field.appendChild(leg);
				previewEl = document.createElement('pre');
				previewEl.id = 'mqttTopicsPreview';
				previewEl.style.whiteSpace = 'pre-wrap';
				field.appendChild(previewEl);
				var port = document.getElementById('mqttPort');
				if (port && port.parentNode) {
					// Insert after the parent container of the port input
					var parent = port.parentNode;
					parent.parentNode.insertBefore(field, parent.nextSibling);
				} else {
					var cfg = document.getElementById('mqttConfig');
					if (cfg) cfg.appendChild(field);
					else document.body.appendChild(field);
				}
				if (typeof locI18Next !== 'undefined') locI18Next.translate([field]);
			}
			var base = document.getElementById('mqttBaseTopic') ? document.getElementById('mqttBaseTopic').value.trim() : '';
			var device = document.getElementById('mqttDeviceId') ? document.getElementById('mqttDeviceId').value.trim() : '';
			if (!device && document.getElementById('mqttClientId')) device = document.getElementById('mqttClientId').value.trim();

			// Get MAC address and replace <MAC> placeholder. Use only hidden DOM field for MAC (upper-case, no colons).
			var macAddress = document.getElementById('macAddress') ? document.getElementById('macAddress').value.trim().toUpperCase() : 'AABBCCDDEEFF';
			device = device.replace(/<MAC>/gi, macAddress);

			// Static list of known topics (mirrors firmware settings.h)
			var commandTopics = ['sleep', 'rfid', 'trackcontrol', 'loudness', 'sleep_timer', 'lock_controls', 'repeatmode', 'led_brightness', 'ambient_light'];
			var stateTopics = ['track', 'cover_changed', 'state', 'ipv4', 'pauseplay', 'playmode', 'wifi_rssi', 'software_revision', 'battery_voltage', 'battery_soc'];

			// Combine command and state topics
			var allTopics = commandTopics.concat(stateTopics);

			var lines = [];
			commandTopics.forEach(function (val) {
				var t = buildMqttTopic(base, device, val, false);
				// Escape HTML to prevent <MAC> from being treated as HTML tag
				lines.push('Command: ' + escapeHtml(val) + ' -&gt; ' + escapeHtml(t));
			});
			allTopics.forEach(function (val) {
				var t = buildMqttTopic(base, device, val, true);
				lines.push('State: ' + escapeHtml(val) + ' -&gt; ' + escapeHtml(t));
			});
			previewEl.innerHTML = lines.join('<br>') || 'No topics configured';
		}

		// Helper function to escape HTML
		function escapeHtml(text) {
			var map = {
				'&': '&amp;',
				'<': '&lt;',
				'>': '&gt;',
				'"': '&quot;',
				"'": '&#039;'
			};
			return text.replace(/[&<>"']/g, function (m) { return map[m]; });
		}

		function secondsToTime(seconds) {
			if (seconds < 3600) {
				return new Date(seconds * 1000).toISOString().substring(14, 19);
			} else {
				return new Date(seconds * 1000).toISOString().slice(11, 19);
			}
		}

		function secondsToDate(seconds) {
			if (seconds == 0) {
				return "--";
			}
			return new Date(seconds * 1000).toLocaleDateString(i18next.lang);
		}

		function timestampToDuration(ms, withSeconds) {
			if (ms == 0) {
				return "--";
			}
			seconds = Number(ms / 1000);
			var d = Math.floor(seconds / (3600 * 24));
			var h = Math.floor(seconds % (3600 * 24) / 3600);
			var m = Math.floor(seconds % 3600 / 60);
			var s = Math.floor(seconds % 60);
			var dDisplay = d > 0 ? d + (d == 1 ? " " + i18next.t("datetime.day") + ", " : " " + i18next.t("datetime.days") + ", ") : "";
			var hDisplay = h > 0 ? h + (h == 1 ? " " + i18next.t("datetime.hour") + ", " : " " + i18next.t("datetime.hours") + ", ") : "";
			var mDisplay = m > 0 ? m + (m == 1 ? " " + i18next.t("datetime.minute") : " " + i18next.t("datetime.minutes")) : "";
			if (withSeconds) {
				var sDisplay = s > 0 ? s + (s == 1 ? " " + i18next.t("datetime.second") : " " + i18next.t("datetime.seconds")) : "";
				if (dDisplay + hDisplay + mDisplay == "") {
					return sDisplay;
				} else {
					if (sDisplay == "") {
						return dDisplay + hDisplay + mDisplay;
					} else {
						return dDisplay + hDisplay + mDisplay + ", " + sDisplay;
					}
				}
			}
			return dDisplay + hDisplay + mDisplay;
		}

				const dontAcceptRfidTwice = $('#dontAcceptRfidTwice');
				const resumeOnSameRfid = $('#resumeOnSameRfid');
				if ($(this).prop('checked')) {
					dontAcceptRfidTwice.prop('checked', false).prop('disabled', true);
					resumeOnSameRfid.prop('disabled', true);
				} else {
					dontAcceptRfidTwice.prop('disabled', false);
					resumeOnSameRfid.prop('disabled', !dontAcceptRfidTwice.prop('checked'));
				}
			});

			/* Reveal the critical-voltage threshold slider only when the shutdown feature is enabled.
			   bootstrap-slider mismeasures its width while display:none, so relayout it now that it's visible. */
			$('#shutdownOnCritical').on('change', function () {
				const checked = $(this).prop('checked');
				document.getElementById('criticalVoltageSection').setAttribute('data-visible', checked);
				if (checked) {
					$('#criticalVoltage').bootstrapSlider('relayout');
				}
			});

			/* Auto-save playback position: the checkbox gates the interval input; default it when enabling. */
			$('#savePlayPosIntervalEnabled').on('change', function () {
				const input = $('#savePlayPosInterval');
				const on = $(this).prop('checked');
				input.prop('disabled', !on);
				if (on && !(parseInt(input.val()) >= 10)) {
					input.val(60);
				}
			});

			/* PN5180 LPCD only applies to the PN5180 reader - disable it (and clear it) for MFRC522. */
			$('#rfidReaderType').on('change', function () {
				const pn5180Lpcd = $('#pn5180Lpcd');
				if (this.value === '1' || this.value === '2') {
					pn5180Lpcd.prop('checked', false).prop('disabled', true);
				} else {
					pn5180Lpcd.prop('disabled', false);
				}
			});

			/* Enable/disable "resumeOnSameRfid" depending on dontAcceptRfidTwice. */
			$('#dontAcceptRfidTwice').on('change', function () {
				const resumeOnSameRfid = $('#resumeOnSameRfid');
				// If pauseIfRfidRemoved is active, dontAcceptRfidTwice is forced disabled anyway.
				if ($('#pauseIfRfidRemoved').prop('checked')) {
					resumeOnSameRfid.prop('disabled', true);
					return;
				}
				const enabled = $(this).prop('checked');
				if (!enabled) {
					resumeOnSameRfid.prop('checked', false);
				}
				resumeOnSameRfid.prop('disabled', !enabled);
			});

			const lightSwitch = $('#lightSwitch');
			/* Changes the color mode to a new one and saves the value to local storage. */
			function newColorMode(mode) {
				console.log('new mode', mode);

				$('body').attr("data-bs-theme", mode);
				// File explorer knows 'default' or 'default-dark' as themes
				$('#explorerTree').jstree('set_theme', mode == 'dark' ? 'default-dark' : 'default');

				localStorage.setItem('lightSwitch', mode);
			}

			/* Triggers a newColorMode(..) call with either 'dark' or 'light'  as the new color mode. */
			function onSwitchDarkMode() {
				newColorMode(lightSwitch.prop('checked') ? 'dark' : 'light');
			}
			/**
			 * @function getSystemDefaultTheme
			 * @summary: get system default theme by media query
			 */
			function getSystemDefaultTheme() {
				const darkThemeMq = window.matchMedia('(prefers-color-scheme: dark)');
				if (darkThemeMq.matches) {
					return 'dark';
				}
				return 'light';
			}

			/* Fetches the settings for lightSwitch from storage or the system default theme. */
			function darkmodeSwitchSetup() {
				lightSwitch.prop('checked', (localStorage.getItem('lightSwitch') || getSystemDefaultTheme()) == 'dark');
				onSwitchDarkMode();
				lightSwitch.change(onSwitchDarkMode);
			}

			function selectActiveTabFromLocalStorage() {
				/* Load last selected tab from local storage and set it as active*/
				ActiveTab = localStorage.getItem("active-tab");
				if (ActiveTab == null) {
					ActiveTab = "nav-rfid-tab";
				}
				console.log("ActiveTab: " + ActiveTab);
				document.querySelectorAll('.main-tab-item').forEach((element) => {
					element.classList.remove('active');
					element.setAttribute("aria-selected", false);
					if (ActiveTab == element.id) {
						element.classList.add('active');
						element.setAttribute("aria-selected", true);
					}
				});
				document.querySelectorAll('.main-tab-pane').forEach((element) => {
					console.log("element id:", element.id);
					element.classList.remove('active');
					element.classList.remove('show');
					if (ActiveTab.replace("-tab", "") == element.id) {
						element.classList.add('active');
						element.classList.add('show');
					}
				});
			}

			function addOption(selectelement, value) {
				const opt = document.createElement("option");
				opt.value = value;
				opt.setAttribute('data-i18n', "files.rfid.mod.cmd." + value);
				selectelement.appendChild(opt);
				return opt;
			}

			/* Replaces a dom element and copies id and classes from the original */
			function replaceCommandSelect(elem, replaceWith) {
				const newElem = replaceWith.cloneNode(true);
				newElem.id = elem.id;
				newElem.className = elem.className;
				newElem.setAttribute('name', elem.getAttribute('name'));
				elem.replaceWith(newElem);
			}

			/* The <select /> that houses all the commands for the settingsex buttons */
			const cmdElem = document.createElement('select');
			const cmdNothing = addOption(cmdElem, 0);
			cmdNothing.setAttribute('data-i18n', "settingsex.buttons.noaction");
			const cmds = [170, 171, 172, 173, 174, 184, 185, 175, 176, 177, 178, 179, 180, 181, 182, 183, 199, 130, 140, 141, 142, 150, 151, 152, 153, 154, 155, 120, 100, 101, 102, 103, 104, 105, 106, 107, 110, 111, 241, 242, 243, 244, 245, 246, 247, 248, 249, 250];
			for (const cmd of cmds) {
				const opt = addOption(cmdElem, cmd);
				if ([140, 141, 142].includes(cmd)) {
					// initially hide bluetooth commands, will be shown when bt is enabled
					opt.style.display = 'none';
				}
			}

			/* fill settingsex button commands */
			document.querySelectorAll('[id*=cmdselect_]:not([id*=cmdselect_rotcw_]):not([id*=cmdselect_rotccw_])').forEach(e => replaceCommandSelect(e, cmdElem));

			/* Rotary CW/CCW selects additionally get CMD_SEEK_PREVIEW (186): a plain short/long/multi-button
			   press has no "turning" to drive it, so it's meaningless there and left out of the shared cmds
			   list above -- only the "hold + turn" gesture selects offer it. */
			const cmdElemRotary = cmdElem.cloneNode(true);
			addOption(cmdElemRotary, 186);
			document.querySelectorAll('[id*=cmdselect_rotcw_], [id*=cmdselect_rotccw_]').forEach(e => replaceCommandSelect(e, cmdElemRotary));

			/* The <select /> that houses all commands for the modification selectors */
			const modElem = document.createElement('select');
			const mods = [100, 179, 101, 102, 103, 104, 105, 106, 110, 111, 120, 130, 140, 141, 142, 150, 151, 152, 153, 154, 155, 0, 170, 171, 172, 173, 174, 184, 185, 180, 181, 176, 177, 241, 242, 243, 244, 245, 246, 247, 248, 249, 250];
			for (const mod of mods) {
				const opt = addOption(modElem, mod);
				if ([140, 141, 142].includes(mod)) {
					opt.style.display = 'none';
				}
			}

			/* fill command selectors at the control page and the rfid assignment */
			document.querySelectorAll("#modId, #commandId").forEach(e => replaceCommandSelect(e, modElem));

			darkmodeSwitchSetup();
			selectActiveTabFromLocalStorage();
			
			setTimeout(function() {
				if (!initialSettingsLoaded) {
					fetch("http://" + host + "/settings")
						.then(function(r) { return r.json(); })
						.then(function(data) { if (data && !initialSettingsLoaded) fillSettings(data); })
						.catch(function(e) {
							console.warn("Settings fallback HTTP fetch failed:", e);
							if (!initialSettingsLoaded) {
								initialSettingsLoaded = true;
								selectActiveTabFromLocalStorage();
							}
						});
				}
			}, 3000);
		});
	</script>
</body>

</html>
