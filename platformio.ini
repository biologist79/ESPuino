; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs = platformio-override.ini
default_envs = lolin_d32_pro_sdmmc_pe

[env]
board_build.flash_mode = qio
board_build.bootloader = dio
board_build.partitions = custom_4mb_noota.csv
;platform = espressif32@^6.10.0 ; Arduino 2.0.17 (ESP-IDF 4.4.7)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip ; Arduino 3.3.7 (ESP-IDF 5.5.2)
;framework = arduino
framework = arduino, espidf
monitor_speed = 115200
;monitor_filters = esp32_exception_decoder ; use ESP Decoder from VSC-Extension instead
;monitor_port = /dev/cu.SLAB_USBtoUART
;upload_port = /dev/cu.SLAB_USBtoUART
;upload_speed = 115200
extra_scripts =
    pre:install_dependencies.py
    pre:gitVersion.py
    pre:updateSdkConfig.py
    pre:processHtml.py
lib_deps =
	https://github.com/Joe91/ESP32-audioI2S.git#24e4a1789b75009a95b45c3f44ecef6b4040b65f ;v3.4.6+
	https://github.com/madhephaestus/ESP32Encoder.git#7501cb47ec702c43de3c64df56d0b10930b9bc70 ; v0.12.0
	https://github.com/Joe91/ESP-FTP-Server-Lib.git#517a2c90876659bfd6692d1f464784a05296e8d8 ; v1.0.1
	https://github.com/FastLED/FastLED.git#20667c3a6413ed46a828f78ec95fb57e58d753f8 ; v3.10.3
	https://github.com/ESP32Async/ESPAsyncWebServer.git#e49293afef68cfb24bb58b4cde998c4060c61472 ; v3.11.0
	https://github.com/bblanchon/ArduinoJson.git#77771d3c07668e01d8f52acb03910c1110bb373f ; v7.4.3
	https://github.com/pschatzmann/arduino-audio-tools.git#b4b32dc849233e1c51424221951c9f5c576671e5 ; v1.2.4
	https://github.com/pschatzmann/ESP32-A2DP.git#b6da4744286ca15b6f1dee607c077a4747294dd4 ; v1.8.11
	https://github.com/Arduino-IRremote/Arduino-IRremote.git#498dc591b255d8ba2e239c875804bdab2ab0fe91 ; v4.7.1
	https://github.com/Joe91/MFRC522_I2C.git#3cabf223fb6b2950474ff41f70c28922f8551341
	https://github.com/tueddy/rfid.git#caa3e6d4f9cc592e800b4467d61d64f765c3156f ; avoid warnings, fork from https://github.com/miguelbalboa/rfid.git#0ff12a1
	https://github.com/tuniii/LogRingBuffer.git#89d7d3e5b74e773cae38345e23ddaf2c4fd3e367
	; PN5180 vendored in lib/ (based on tueddy/PN5180-Library@69ec032) with fast no-card detection in activateTypeA
	https://github.com/SZenglein/Arduino-MAX17055_Driver.git#60aa4657c42bd61a436831009f8188c1cbbf71dd
	https://github.com/tueddy/natsort.git#ebbf6604c573c5315daa8fa77da8f047f202bd63 ; avoid warnings, fork from https://github.com/sourcefrog/natsort.git#cdd8df9
	olikraus/U8g2@^2.35.9 ; OLED display (SH1106/SSD1306), only compiled when OLED_ENABLE is set

board_build.embed_txtfiles =
    managed_components/espressif__esp_insights/server_certs/https_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_mqtt_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_claim_service_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_ota_server.crt

build_flags =
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DCONFIG_ASYNC_TCP_USE_WDT=1
    -DCORE_DEBUG_LEVEL=0 ;6
    -DCONFIG_FATFS_USE_LABEL=1 ; enable sd card volume label support
    -DENABLE_FTP_SANITIZATION
    -std=c++17
    -std=gnu++17
    -Wall
    -Wextra
    -Wunreachable-code

build_unflags =
    -std=gnu++11
    -Werror=all


[env:lolin_d32_pro]
;https://docs.platformio.org/en/latest/boards/espressif32/lolin_d32_pro.html
board = lolin_d32_pro
board_build.partitions = custom_16mb_ota.csv
build_flags = ${env.build_flags}
              -DHAL=4
              -DBOARD_HAS_PSRAM
              -mfix-esp32-psram-cache-issue
              -DLOG_BUFFER_SIZE=10240
              -DBOARD_HAS_16MB_FLASH_AND_OTA_SUPPORT
board_upload.maximum_size = 16777216
board_upload.flash_size = 16MB

[env:lolin_d32_pro_sdmmc_pe]
;https://docs.platformio.org/en/latest/boards/espressif32/lolin_d32_pro.html
board = lolin_d32_pro
board_build.partitions = custom_16mb_ota.csv
build_flags = ${env.build_flags}
              -DHAL=7
              -DBOARD_HAS_PSRAM
              -mfix-esp32-psram-cache-issue
              -DLOG_BUFFER_SIZE=10240
              -DBOARD_HAS_16MB_FLASH_AND_OTA_SUPPORT
board_upload.maximum_size = 16777216
board_upload.flash_size = 16MB


[env:ttgo_t8]
;https://docs.platformio.org/en/latest/boards/espressif32/esp-wrover-kit.html
board = esp-wrover-kit
build_flags = ${env.build_flags}
              -DHAL=5
              -DBOARD_HAS_PSRAM
              -mfix-esp32-psram-cache-issue
              -DLOG_BUFFER_SIZE=10240

[env:complete]
;https://docs.platformio.org/en/latest/boards/espressif32/esp-wrover-kit.html
board = esp-wrover-kit
board_build.partitions = custom_16mb_ota.csv
build_flags = ${env.build_flags}
              -DHAL=6
              -DBOARD_HAS_PSRAM
              -mfix-esp32-psram-cache-issue
              -DLOG_BUFFER_SIZE=10240
              -DBOARD_HAS_16MB_FLASH_AND_OTA_SUPPORT
board_upload.maximum_size = 16777216
board_upload.flash_size = 16MB

; custom board based on 8 MB flash devkitc
[env:esp32-wrover-devkitc-v4-8mb]
;https://docs.platformio.org/en/latest/boards/espressif32/esp-wrover-kit.html
board = esp-wrover-kit
board_build.partitions = custom_8mb_ota.csv
build_flags = ${env.build_flags}
              -DHAL=99
              -DBOARD_HAS_PSRAM
              -mfix-esp32-psram-cache-issue
              -DLOG_BUFFER_SIZE=10240
              -DBOARD_HAS_16MB_FLASH_AND_OTA_SUPPORT ; 8MB is fine
board_upload.maximum_size = 8388608
board_upload.flash_size = 8MB

;;; Change upload/monitor-port of your board regarding your operating-system and develboard!
;MAC: /dev/cu.SLAB_USBtoUART / /dev/cu.wchusbserial1420 / /dev/cu.wchusbserial1410
;WINDOWS: COM3
;LINUX: /dev/ttyUSB0 (if it's the first USB-device attached, otherwise increase number)


[env:esp32-s3-devkitc-1]
;https://docs.platformio.org/en/latest/boards/espressif32/esp32-s3-devkitc-1.html
board = esp32-s3-devkitc-1
platform = espressif32

; change microcontroller
board_build.mcu = esp32s3

; change MCU frequency
build_flags = ${env.build_flags}
              -DHAL=99
              -DLOG_BUFFER_SIZE=10240
