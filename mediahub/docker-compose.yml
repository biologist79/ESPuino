services:
  mediahub:
    build: .
    image: espuino-mediahub
    container_name: espuino-mediahub
    # Run as www-data (33:33) instead of root by default. Make sure the host
    # ./data directory is writable by that uid/gid, e.g.:
    #   chown -R 33:33 ./data
    #
    # Your ./media library also needs to be *readable* by this uid/gid —
    # directory listing and file reading are separate Unix permissions, so a
    # track can show up in the browser yet fail to save with "permission
    # denied" if the file itself isn't world-readable. Either:
    #   chmod -R o+rX /path/to/your/library
    # or override `user:` below to match the uid/gid that already owns it
    # (e.g. `id -u`:`id -g` of your own account) instead of 33:33.
    user: "33:33"
    ports:
      - "8080:8080"
    volumes:
      # Devices/cards/assignments (db.json) — small, structured data
      - ./data:/data
      # Your own existing audio library, browsed and referenced in place —
      # MediaHub never writes here, just point this at wherever your music/
      # audiobook files already live. Read-only is enough (and enforced).
      - ./media:/media:ro
    environment:
      - MEDIAHUB_DATA=/data
      - MEDIAHUB_MEDIA=/media
      - TZ=Europe/Berlin
    restart: unless-stopped
